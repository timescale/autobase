---
- name: Molecule.redeploy.verify
  hosts: all
  gather_facts: true
  tasks:
    - name: Include common variables
      ansible.builtin.include_vars:
        file: ../../roles/common/defaults/main.yml

    - name: Check Patroni is healthy on all nodes
      ansible.builtin.uri:
        url: >-
          {{ patroni_restapi_protocol | default('https') }}://{{ ansible_default_ipv4.address }}:{{ patroni_restapi_port | default('8008') }}/health
        method: GET
        return_content: true
        validate_certs: false
      register: patroni_health
      until: patroni_health.status == 200 and patroni_health.json.state == 'running'
      retries: 30
      delay: 10

    - name: Check PostgreSQL is accepting connections
      become: true
      become_user: postgres
      ansible.builtin.command: "{{ postgresql_bin_dir }}/pg_isready -p {{ postgresql_port }}"
      changed_when: false

    - name: Verify patroni is not masked (cleanup from fix)
      ansible.builtin.command: systemctl is-enabled patroni
      register: patroni_enabled
      changed_when: false
      failed_when: patroni_enabled.stdout == 'masked'
