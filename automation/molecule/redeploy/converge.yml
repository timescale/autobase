---
# Phase 1: Deploy a working PostgreSQL cluster
- name: "Converge | [1/4] Deploy"
  hosts: all
  gather_facts: true

  tasks:
    - name: Set variables for PostgreSQL Cluster deployment
      ansible.builtin.set_fact:
        ansible_become_method: su
        firewall_enabled_at_boot: false
        firewall_enable_ipv6: false
        swap_file_create: false
        sysctl_set: false
        chronyd_ignore_errors: true
        nameservers: ["8.8.8.8", "9.9.9.9"]
        timezone: "Etc/UTC"
        with_haproxy_load_balancing: false
        dcs_type: "etcd"
        postgresql_version: 18
        synchronous_mode: true
        cacheable: true
      delegate_to: localhost
      run_once: true # noqa run-once

    - name: Set variables for custom PostgreSQL data and WAL directory
      ansible.builtin.set_fact:
        postgresql_data_dir: "/pgdata/{{ postgresql_version }}/main"
        postgresql_wal_dir: "/pgwal/{{ postgresql_version }}/pg_wal"

    - name: Update all system packages
      ansible.builtin.include_role:
        name: ../../roles/update
        tasks_from: system

    - name: Install openssh-server package
      become: true
      ansible.builtin.package:
        name: openssh-server
        state: present

    - name: Start ssh service
      become: true
      ansible.builtin.systemd:
        name: "{{ 'ssh' if ansible_os_family == 'Debian' else 'sshd' }}"
        state: started
        enabled: true

    - name: Delete "/run/nologin" file (if exists)
      become: true
      ansible.builtin.file:
        path: /run/nologin
        state: absent

- name: Deploy PostgreSQL Cluster
  ansible.builtin.import_playbook: ../../playbooks/deploy_pgcluster.yml

# Phase 2: Verify the cluster is healthy before we break it
- name: "Converge | [2/4] Verify"
  hosts: all
  gather_facts: true
  tasks:
    - name: Include common variables
      ansible.builtin.include_vars:
        file: ../../roles/common/defaults/main.yml

    - name: Check Patroni is healthy on all nodes
      ansible.builtin.uri:
        url: >-
          {{ patroni_restapi_protocol | default('https') }}://{{ ansible_default_ipv4.address }}:{{ patroni_restapi_port | default('8008') }}/health
        method: GET
        return_content: true
        validate_certs: false
      register: patroni_health
      until: patroni_health.status == 200 and patroni_health.json.state == 'running'
      retries: 30
      delay: 10

# Phase 3: Remove the cluster
- name: "Converge | [3/4] Remove"
  hosts: all
  gather_facts: false
  tasks:
    - name: Enable removal of all components
      ansible.builtin.set_fact:
        remove_postgres: true
        remove_etcd: true
        cacheable: true

- name: Remove PostgreSQL Cluster
  ansible.builtin.import_playbook: ../../playbooks/remove_cluster.yml

# Phase 4: Re-deploy with reduced pg_isready timeout so the test
# fails fast (~1 min) instead of hanging for 8 hours.
- name: "Converge | [4/4] Re-deploy"
  hosts: all
  gather_facts: false
  tasks:
    - name: Override pg_isready retries for test
      ansible.builtin.set_fact:
        pg_isready_retries: 10
        pg_isready_delay: 5
        cacheable: true

- name: Re-deploy PostgreSQL Cluster
  ansible.builtin.import_playbook: ../../playbooks/deploy_pgcluster.yml
