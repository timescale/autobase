---
platforms:
  - name: pgnode01
    hostname: pgnode01
    image: "${IMAGE_NAMESPACE:-geerlingguy}/docker-${IMAGE_DISTRO:-ubuntu2404}-ansible:${IMAGE_TAG:-latest}"
    networks:
      - name: redeploy_test_docker_network
        ipv4_address: 10.172.1.20
    exposed_ports:
      - 22/tcp
      - 2379/tcp
      - 2380/tcp
      - 8008/tcp
      - 5432/tcp
      - 6432/tcp
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
    groups:
      - etcd_cluster
      - master
      - postgres_cluster
      - balancers

